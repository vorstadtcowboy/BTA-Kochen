<!DOCTYPE html>
<html lang="de">
  <head>

      <!-- Menübutton-->
      <button id="navbutton">
        <img src="img/menu.svg" alt="Menü" height="40" />

      <!-- Navigation -->

          <li>
            <a href="#" class="navlinks">Home</a>

          <li>

          <li>

    <main>
